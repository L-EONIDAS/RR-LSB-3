<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="color-scheme" content="dark light" />
<title>LevelSet Bio — Asset Decision Command Center</title>
<style>
:root{--side:244px;--top:68px;--r:15px;--r2:11px;--ease:cubic-bezier(.2,.8,.2,1);--font:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
html[data-theme="dark"]{--bg:#070b11;--bg2:#0a111b;--panel:#0d1520;--panel2:#111c29;--panel3:#152334;--glass:rgba(9,15,24,.86);--ink:#edf3f8;--muted:#8fa1b4;--faint:#5e7184;--line:#1c2b3a;--line2:#152333;--teal:#44d0df;--teal2:#0e92a7;--blue:#6e9cff;--violet:#9a82ff;--gold:#e0b35d;--green:#45d38b;--amber:#efb64f;--red:#ff7468;--grid:rgba(92,146,190,.045);--shadow:0 18px 55px rgba(0,0,0,.34);--soft:rgba(255,255,255,.035)}
html[data-theme="light"]{--bg:#eef3f7;--bg2:#e6edf3;--panel:#fff;--panel2:#f7fafc;--panel3:#edf3f7;--glass:rgba(250,252,254,.90);--ink:#122536;--muted:#5e7385;--faint:#8b9aa7;--line:#d7e2ea;--line2:#e7eef3;--teal:#087e90;--teal2:#0a6877;--blue:#456bd0;--violet:#7157c9;--gold:#9b6b13;--green:#188353;--amber:#a66b08;--red:#c3493b;--grid:rgba(18,72,105,.04);--shadow:0 15px 45px rgba(18,50,73,.10);--soft:rgba(14,72,103,.03)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased}body{background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px),radial-gradient(900px 500px at 76% -8%,rgba(57,126,178,.13),transparent 68%);background-size:34px 34px,34px 34px,auto;background-attachment:fixed}button,input,select{font:inherit;color:inherit}button{cursor:pointer}svg text{font-family:var(--font)}.mono{font-variant-numeric:tabular-nums}.hidden{display:none!important}
/* shell */
.sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);background:linear-gradient(180deg,#08111a,#07101a 58%,#09131e);border-right:1px solid rgba(255,255,255,.07);padding:17px 13px;z-index:30;display:flex;flex-direction:column;color:#fff}.brand{display:flex;align-items:center;gap:11px;padding:2px 8px 17px;border-bottom:1px solid rgba(255,255,255,.08)}.mark{width:35px;height:35px;border-radius:10px;border:1px solid rgba(255,255,255,.13);display:grid;place-items:center;background:linear-gradient(145deg,rgba(68,208,223,.22),rgba(110,156,255,.06));box-shadow:inset 0 1px rgba(255,255,255,.08)}.mark svg{width:22px}.brand-title{font-size:14px;font-weight:760}.brand-sub{font-size:9.5px;color:#7f9ab2;text-transform:uppercase;letter-spacing:1px;margin-top:2px}.nav-label{padding:17px 11px 7px;font-size:9px;color:#55728a;font-weight:750;text-transform:uppercase;letter-spacing:1.25px}.nav{display:flex;flex-direction:column;gap:3px}.nav button{border:0;background:transparent;color:#9db1c3;display:flex;align-items:center;gap:11px;text-align:left;padding:10px 11px;border-radius:10px;transition:.18s var(--ease);position:relative}.nav button:hover{background:rgba(255,255,255,.045);color:#fff}.nav button.active{color:#fff;background:linear-gradient(90deg,rgba(68,208,223,.15),rgba(68,208,223,.035));box-shadow:inset 0 0 0 1px rgba(68,208,223,.12)}.nav button.active:before{content:"";position:absolute;left:-2px;top:8px;bottom:8px;width:3px;border-radius:4px;background:var(--teal)}.nav-ico{width:18px;height:18px;display:grid;place-items:center;color:#7590a6}.nav button.active .nav-ico{color:var(--teal)}.nav-ico svg{width:17px;height:17px}.nav-name{font-size:12px;font-weight:600}.nav-num{margin-left:auto;font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(255,255,255,.06);color:#87a2b7}.sidebar-foot{margin-top:auto}.spine{border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.03);border-radius:12px;padding:11px}.spine-k{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#68859c}.spine-v{font-size:11px;font-weight:650;margin-top:5px}.spine-track{height:3px;background:rgba(255,255,255,.07);border-radius:3px;margin-top:10px;overflow:hidden}.spine-track i{display:block;height:100%;width:82%;background:linear-gradient(90deg,var(--teal),var(--blue))}.spine-meta{display:flex;justify-content:space-between;margin-top:7px;font-size:9px;color:#6f8da5}
.topbar{position:fixed;left:var(--side);right:0;top:0;height:var(--top);z-index:25;background:var(--glass);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 22px}.context{min-width:260px}.context-k{font-size:9px;text-transform:uppercase;letter-spacing:1.25px;font-weight:800;color:var(--teal)}.context-t{font-size:17px;font-weight:740;margin-top:1px;letter-spacing:-.2px}.search{margin-left:auto;position:relative;width:min(460px,38vw)}.search input{width:100%;height:38px;border:1px solid var(--line);background:var(--panel2);border-radius:10px;padding:0 76px 0 37px;outline:none}.search input:focus{border-color:var(--teal2);box-shadow:0 0 0 3px rgba(68,208,223,.08)}.search svg{position:absolute;width:16px;left:12px;top:11px;color:var(--muted)}.kbd{position:absolute;right:9px;top:8px;font-size:9px;color:var(--faint);border:1px solid var(--line);background:var(--panel);padding:3px 6px;border-radius:5px}.top-actions{display:flex;gap:7px}.icon-btn{width:38px;height:38px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);display:grid;place-items:center}.icon-btn:hover{border-color:var(--teal2)}.icon-btn svg{width:16px;color:var(--muted)}
.main{margin-left:var(--side);padding:calc(var(--top) + 21px) 22px 45px;max-width:1840px}.view{display:none}.view.active{display:block;animation:enter .32s var(--ease)}@keyframes enter{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* basics */
.head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:15px}.head h1{font-size:24px;line-height:1.12;margin:0;letter-spacing:-.55px}.head p{margin:5px 0 0;color:var(--muted);max-width:810px;font-size:11.5px}.head-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.btn{border:1px solid var(--line);background:var(--panel);border-radius:9px;padding:8px 11px;font-size:10.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px}.btn:hover{border-color:var(--teal2);transform:translateY(-1px)}.btn.primary{border-color:transparent;color:#fff;background:linear-gradient(135deg,#0d8fa4,#2b6984)}.btn svg{width:13px}.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(69,211,139,.09)}
.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:13px}.s12{grid-column:span 12}.s9{grid-column:span 9}.s8{grid-column:span 8}.s7{grid-column:span 7}.s6{grid-column:span 6}.s5{grid-column:span 5}.s4{grid-column:span 4}.s3{grid-column:span 3}.card{background:linear-gradient(180deg,var(--panel),color-mix(in srgb,var(--panel) 92%,var(--bg)));border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;position:relative}.pad{padding:16px 17px}.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.card-title{font-size:13.5px;font-weight:730}.card-note{font-size:10.5px;color:var(--muted);margin-top:3px}.overline{font-size:8.5px;color:var(--teal);text-transform:uppercase;letter-spacing:1.1px;font-weight:800}.card-tools{display:flex;gap:6px}.tool{border:1px solid var(--line);background:var(--panel2);border-radius:7px;padding:5px 8px;font-size:9px;color:var(--muted)}
/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:13px}.kpi{background:linear-gradient(145deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:13px;padding:13px 14px;min-height:91px;position:relative;overflow:hidden}.kpi:after{content:"";position:absolute;inset:auto -22px -33px auto;width:105px;height:105px;border-radius:50%;background:radial-gradient(circle,rgba(68,208,223,.11),transparent 67%)}.kpi-k{font-size:9px;text-transform:uppercase;letter-spacing:.75px;color:var(--muted);font-weight:750}.kpi-v{font-size:25px;font-weight:780;letter-spacing:-.5px;margin-top:5px}.kpi-s{font-size:9.5px;color:var(--faint);margin-top:4px}.kpi-badge{position:absolute;right:11px;top:11px;font-size:8.5px;border:1px solid var(--line);padding:3px 6px;border-radius:7px;color:var(--muted);background:var(--panel)}
/* funnel */
.funnel-card{min-height:345px}.funnel-row{display:grid;grid-template-columns:minmax(0,1fr) 215px;min-height:292px}.funnel-main{padding:16px 16px 11px}.funnel-detail{border-left:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),transparent);padding:16px}.funnel-svg{width:100%;height:245px;display:block;overflow:visible}.stage{cursor:pointer}.stage .halo{opacity:.11;transition:.2s}.stage .bar{transition:.2s;filter:drop-shadow(0 8px 16px rgba(0,0,0,.15))}.stage:hover .halo,.stage.active .halo{opacity:.38}.stage:hover .bar{filter:brightness(1.12) drop-shadow(0 10px 18px rgba(0,0,0,.25))}.stage.active .bar{stroke:var(--gold);stroke-width:2}.f-num{font-size:23px;font-weight:780;fill:var(--ink)}.f-label{font-size:9px;font-weight:680;fill:var(--muted)}.f-conv{font-size:8px;font-weight:750;fill:#fff}.f-arrow{font-size:10px;fill:var(--faint)}.fd-name{font-size:11px;font-weight:750}.fd-count{font-size:31px;font-weight:800;margin-top:5px}.fd-meta{color:var(--muted);font-size:9.5px}.fd-rule{height:1px;background:var(--line);margin:12px 0}.fd-k{font-size:8.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.65px}.fd-v{font-size:11px;font-weight:650;margin-top:2px}.fd-list{display:grid;gap:6px;margin-top:11px}.fd-asset{border:1px solid var(--line);border-radius:8px;padding:7px 8px;background:var(--panel);cursor:pointer}.fd-asset:hover{border-color:var(--teal2)}.fd-asset b{font-size:10.5px}.fd-asset span{display:block;color:var(--muted);font-size:8.5px;margin-top:2px}

.pulse-list{display:grid;gap:8px}.pulse{display:grid;grid-template-columns:7px 1fr auto;gap:9px;align-items:start;padding:9px 0;border-bottom:1px solid var(--line2)}.pulse:last-child{border-bottom:0}.pulse i{width:7px;height:7px;border-radius:50%;margin-top:4px}.pulse b{font-size:10.5px}.pulse p{font-size:9px;color:var(--muted);margin:2px 0 0}.pulse .n{font-weight:760;font-size:11px}.tone-g{background:var(--green)}.tone-a{background:var(--amber)}.tone-r{background:var(--red)}.tone-b{background:var(--blue)}.spine-flow{display:flex;align-items:center;gap:4px;margin-top:12px}.spine-node{flex:1;min-width:0;border:1px solid var(--line);background:var(--panel2);border-radius:8px;padding:8px 7px;text-align:center}.spine-node b{font-size:9px;display:block}.spine-node span{font-size:7.5px;color:var(--muted)}.spine-arrow{font-size:9px;color:var(--faint)}
/* map */
.map-wrap{position:relative;height:370px;overflow:hidden;background:radial-gradient(600px 230px at 50% 45%,rgba(29,73,105,.12),transparent 70%)}.map-img{position:absolute;inset:18px 18px 10px;width:calc(100% - 36px);height:calc(100% - 28px);object-fit:contain;opacity:.92;filter:saturate(.9)}.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(73,119,153,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(73,119,153,.045) 1px,transparent 1px);background-size:48px 48px;mask-image:linear-gradient(to bottom,transparent,black 15%,black 85%,transparent)}.map-point{position:absolute;transform:translate(-50%,-50%);border:0;background:transparent;padding:0}.map-point:before{content:"";position:absolute;left:50%;top:50%;width:var(--sz);height:var(--sz);border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(68,208,223,.50),rgba(68,208,223,.12) 48%,transparent 70%);animation:pulse 2.7s infinite}.map-point:after{content:"";display:block;width:7px;height:7px;border-radius:50%;background:var(--teal);border:2px solid rgba(7,11,17,.9);box-shadow:0 0 14px var(--teal)}@keyframes pulse{0%,100%{opacity:.45;transform:translate(-50%,-50%) scale(.8)}50%{opacity:.95;transform:translate(-50%,-50%) scale(1.18)}}.map-point:hover:before,.map-point.active:before{background:radial-gradient(circle,rgba(224,179,93,.62),rgba(224,179,93,.17) 48%,transparent 70%)}.map-point:hover:after,.map-point.active:after{background:var(--gold);box-shadow:0 0 17px var(--gold)}.map-tooltip{position:absolute;pointer-events:none;background:rgba(6,11,17,.96);color:#fff;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:8px 10px;min-width:170px;box-shadow:0 18px 45px rgba(0,0,0,.4);z-index:4;display:none}.map-tooltip b{font-size:10.5px}.map-tooltip div{font-size:8.5px;color:#94aabd;margin-top:2px}.geo-list{display:grid;gap:5px}.geo-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid transparent;border-radius:8px;padding:7px 8px;cursor:pointer}.geo-row:hover,.geo-row.active{border-color:var(--line);background:var(--panel2)}.geo-name{font-size:10px;font-weight:650}.geo-sub{font-size:8.5px;color:var(--muted)}.geo-count{font-size:15px;font-weight:780}.map-legend{position:absolute;left:17px;bottom:11px;font-size:8.5px;color:var(--muted);display:flex;align-items:center;gap:7px}.map-legend i{display:inline-block;width:30px;height:5px;border-radius:5px;background:linear-gradient(90deg,rgba(68,208,223,.15),var(--teal))}
/* heatmap */
.heat-wrap{overflow:auto}.heat{display:grid;grid-template-columns:155px repeat(7,minmax(55px,1fr));gap:4px;min-width:690px}.heat-head{font-size:7.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;text-align:center;padding:3px}.heat-name{height:28px;display:flex;align-items:center;gap:7px;font-size:9.5px;white-space:nowrap;overflow:hidden}.heat-name i{width:6px;height:6px;border-radius:50%;flex:none}.heat-cell{height:28px;border-radius:6px;display:grid;place-items:center;font-size:8px;font-weight:750;position:relative;overflow:hidden}.heat-cell:after{content:"";position:absolute;inset:auto 0 0;height:2px;background:currentColor;opacity:.6}.h0{background:var(--panel3);color:var(--faint)}.h1{background:rgba(255,116,104,.11);color:var(--red)}.h2{background:rgba(239,182,79,.12);color:var(--amber)}.h3{background:rgba(110,156,255,.12);color:var(--blue)}.h4{background:rgba(69,211,139,.12);color:var(--green)}
/* decision reasons */
.reason-list{display:grid;gap:9px}.reason{display:grid;grid-template-columns:1fr 30px;gap:8px}.reason-top{display:flex;justify-content:space-between;font-size:9px;margin-bottom:4px}.reason-top span:first-child{color:var(--muted)}.bar{height:6px;border-radius:7px;background:var(--panel3);overflow:hidden}.bar i{height:100%;display:block;border-radius:7px;background:linear-gradient(90deg,var(--red),var(--amber))}.reason .num{font-size:12px;font-weight:750;text-align:right;padding-top:13px}
/* scatter */
.scatter{height:300px;position:relative}.scatter svg{width:100%;height:100%;display:block}.axis{stroke:var(--line);stroke-width:1}.gridline{stroke:var(--line2);stroke-width:1;stroke-dasharray:3 5}.axis-label{font-size:8px;fill:var(--faint)}.quad{fill:rgba(69,211,139,.025)}.bubble{cursor:pointer;transition:.16s}.bubble:hover{filter:brightness(1.22)}.bubble-label{font-size:8.5px;fill:var(--ink);font-weight:700;pointer-events:none}.model-note{font-size:8.5px;color:var(--faint);margin-top:6px}

.queue{display:grid;gap:7px}.qrow{border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:var(--panel2);cursor:pointer}.qrow:hover{border-color:var(--teal2);transform:translateX(2px)}.qtop{display:flex;align-items:center;justify-content:space-between;gap:8px}.qname{font-size:10.5px;font-weight:720}.qdue{font-size:8px;color:var(--amber);border:1px solid rgba(239,182,79,.25);background:rgba(239,182,79,.07);border-radius:6px;padding:2px 5px}.qissue{font-size:8.5px;color:var(--muted);margin-top:3px}.qmeta{display:flex;justify-content:space-between;font-size:8px;color:var(--faint);margin-top:7px}.progress{height:3px;background:var(--panel3);border-radius:3px;margin-top:5px;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--blue))}
/* triage page */
.filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px}.filter{height:34px;border:1px solid var(--line);background:var(--panel);border-radius:9px;padding:0 10px;font-size:10px;outline:none}.filter.search-input{min-width:230px}.cohort-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:13px}.cohort{border:1px solid var(--line);border-radius:11px;background:var(--panel);padding:11px}.cohort b{font-size:19px}.cohort span{display:block;font-size:8.5px;color:var(--muted);margin-top:2px}.triage-table-wrap,.reg-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:940px}.table th{font-size:7.5px;text-transform:uppercase;letter-spacing:.55px;color:var(--faint);font-weight:750;text-align:left;background:var(--panel2);position:sticky;top:0;z-index:2}.table th,.table td{padding:9px 10px;border-bottom:1px solid var(--line2)}.table tbody tr{cursor:pointer}.table tbody tr:hover td{background:var(--soft)}.asset-main{font-size:10.5px;font-weight:700}.asset-sub{font-size:8.5px;color:var(--muted);margin-top:2px}.pill{display:inline-flex;align-items:center;padding:3px 7px;border-radius:12px;font-size:8px;font-weight:750;white-space:nowrap}.pill.advance,.pill.green{color:var(--green);background:rgba(69,211,139,.10)}.pill.hold,.pill.yellow{color:var(--amber);background:rgba(239,182,79,.10)}.pill.kill,.pill.red{color:var(--red);background:rgba(255,116,104,.10)}.pill.inflight,.pill.blue{color:var(--blue);background:rgba(110,156,255,.10)}.meter{width:70px;height:5px;background:var(--panel3);border-radius:5px;overflow:hidden}.meter i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--blue))}
/* deep diligence cards */

const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function nav(){ $('#nav').innerHTML=VIEWS.map(v=>`<button class="${state.view===v.id?'active':''}" data-view="${v.id}"><span class="nav-ico">${ICONS[v.id]}</span><span class="nav-name">${v.name}</span><span class="nav-num">${v.n}</span></button>`).join(''); $$('#nav button').forEach(b=>b.onclick=()=>show(b.dataset.view)); }
function show(id){state.view=id; $$('.view').forEach(v=>v.classList.toggle('active',v.id===id)); const m=VIEWS.find(v=>v.id===id); $('#contextK').textContent=m.k; $('#contextT').textContent=m.name; nav(); ({command:renderCommand,triage:renderTriage,diligence:renderDiligence,asset:renderAsset,newco:renderNewco,registry:renderRegistry})[id](); window.scrollTo({top:0,behavior:'smooth'});}

const stages=[
 {key:'logged',label:'Logged',count:417,color:'#44d0df',desc:'All sourced opportunities'},

function palette(q=''){const items=[...VIEWS.map(v=>({type:'view',id:v.id,name:v.name,sub:v.k})),...DATA.assets.map(a=>({type:'asset',id:a.id,name:a.model?.short||a.name,sub:a.holder+' · '+a.indication}))].filter(x=>!q||[x.name,x.sub,x.id].join(' ').toLowerCase().includes(q.toLowerCase())).slice(0,45);$('#paletteList').innerHTML=items.map(x=>`<div class="pal-item" data-type="${x.type}" data-id="${x.id}"><div><b>${esc(x.name)}</b><br><span>${esc(x.sub)}</span></div><span>${x.type==='view'?'VIEW':esc(x.id)}</span></div>`).join('');$$('.pal-item').forEach(x=>x.onclick=()=>{x.dataset.type==='view'?show(x.dataset.id):openAsset(x.dataset.id);$('#palette').classList.remove('open')})}
function openPalette(q=''){palette(q);$('#palette').classList.add('open');$('#paletteInput').value=q;setTimeout(()=>$('#paletteInput').focus(),20)}
$('#globalSearch').onfocus=()=>openPalette($('#globalSearch').value);$('#globalSearch').oninput=e=>openPalette(e.target.value);$('#paletteInput').oninput=e=>palette(e.target.value);$('#palette').onclick=e=>{if(e.target.id==='palette')$('#palette').classList.remove('open')};document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openPalette()}if(e.key==='Escape')$('#palette').classList.remove('open')});
$('#themeBtn').onclick=()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'};
nav();renderCommand();
